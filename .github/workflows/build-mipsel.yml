name: Build mipsel-unknown-linux-muslsf

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-muslsf
  TOOLCHAIN: mipsel-linux-muslsf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MIPS muslsf toolchain (via GH raw / mirror)
        run: |
          # 用 GitHub 自己的 CDN 中转一份，或者用备用源
          wget -q https://github.com/richfelker/musl-cross-make/releases/download/20240302/mipsel-linux-muslsf-cross.tgz -O mipsel.tgz
          tar xzf mipsel.tgz -C /opt
          echo "/opt/mipsel-linux-muslsf-cross/bin" >> $GITHUB_PATH

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Write Cargo linker config
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.${{ env.TARGET }}]
          linker = "${{ env.TOOLCHAIN }}-gcc"
          ar = "${{ env.TOOLCHAIN }}-ar"
          EOF

      - name: Build rdl-server-cli (static, soft-float)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static -C link-self-contained=yes" \
          cargo +nightly build-server-cli --release --target ${{ env.TARGET }} -Z build-std

      - name: Strip binary
        run: |
          ${{ env.TOOLCHAIN }}-strip target/${{ env.TARGET }}/release/rdl-server-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-${{ env.TARGET }}
          path: target/${{ env.TARGET }}/release/rdl-server-cli
