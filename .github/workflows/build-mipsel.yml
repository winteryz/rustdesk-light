name: Build mipsel (Zig soft-float locked)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # 用 Zig 0.11（最稳的 MIPS sf 支持，0.13 才改的硬浮点默认）
      - name: Install Zig (0.11 for mips soft-float)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0

      # 关键：wrapper 里同时声明 target + soft-float
      - name: Create zig-softfloat wrapper
        run: |
          cat > zig-mips-sf.sh << 'EOF'
          #!/bin/sh
          exec zig cc -target mipsel-linux-musl -msoft-float "$@"
          EOF
          chmod +x zig-mips-sf.sh

      - name: Build rdl-server-cli
        run: |
          RUSTFLAGS="\
            -C linker=$(pwd)/zig-mips-sf.sh \
            -C target-feature=+crt-static \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & verify
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli
          echo "=== Binary ==="
          file target/${{ env.TARGET }}/release/rdl-server-cli

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-sf
          path: target/${{ env.TARGET }}/release/rdl-server-cli
