name: Build mipsel (Zig linker + build-std)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Install Zig (provides full musl sysroot)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build rdl-server-cli
        run: |
          RUSTFLAGS="\
            -C linker=zig \
            -C link-arg=cc \
            -C link-arg=-target \
            -C link-arg=mipsel-linux-musl \
            -C target-feature=+crt-static \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & verify
        run: |
          # Zig 自带的 strip 兼容 musl
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli

          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel
          path: target/${{ env.TARGET }}/release/rdl-server-cli
