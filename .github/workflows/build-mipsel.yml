name: Build mipsel (zigbuild + build-std)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Nightly + rust-src（必须，供 build-std 现场编 std）
      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # 2. Zig（提供 musl sysroot / crt / unwind）
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 3. cargo-zigbuild
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      # 4. 缝合：zigbuild 负责链接，build-std 负责 std
      - name: Build rdl-server-cli
        run: |
          cargo zigbuild \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & inspect
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli

          echo "=== Binary Info ==="
          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Fully static — ready for router"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-router
          path: target/${{ env.TARGET }}/release/rdl-server-cli
