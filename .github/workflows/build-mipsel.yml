name: Build mipsel (Zig Linker, fully static)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Rust Nightly + rust-src
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # 2. 装 Zig（自带完整 mipsel musl sysroot）
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 3. 用 Zig 伪装成 musl gcc 做 linker
      - name: Build rdl-server-cli via Zig
        run: |
          RUSTFLAGS="\
            -C linker=zig \
            -C link-arg=cc \
            -C link-arg=-target \
            -C link-arg=mipsel-linux-musl \
            -C target-feature=+crt-static" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip binary
        run: |
          zig run -target mipsel-linux-musl -cflags -s -- \
            -Wl,--strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli -o target/${{ env.TARGET }}/release/rdl-server-cli
          # 或者直接用 host strip 跳过（Zig 产物本身就是静态的，strip 不影响）

      - name: Inspect
        run: |
          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Static OK"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-static
          path: target/${{ env.TARGET }}/release/rdl-server-cli
