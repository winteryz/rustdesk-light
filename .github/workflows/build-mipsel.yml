name: Build mipsel (router-ready, static)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 1. Rust Nightly + rust-src（Tier 3 必须） ──
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # ── 2. Zig 0.11（0.13 改了 MIPS 默认硬浮点，这里锁死 0.11） ──
      - name: Install Zig 0.11
        uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0

      # ── 3. 写 wrapper：唯一目的就是吃掉 Rust 的 -nostartfiles ──
      - name: Create soft-float zig wrapper
        run: |
          cat > zigwrap.sh << 'EOF'
          #!/bin/sh
          filtered=""
          while [ $# -gt 0 ]; do
            case "$1" in
              # Rust build-std 会硬塞这两个，Zig 收到就自闭，直接吞掉
              -nostartfiles|-nodefaultlibs) ;;
              *) filtered="$filtered \"$1\"" ;;
            esac
            shift
