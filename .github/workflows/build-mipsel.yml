name: Build mipsel-unknown-linux-muslsf

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-muslsf
  TOOLCHAIN: mipsel-linux-muslsf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Download mipsel-linux-muslsf toolchain
        run: |
          wget -q http://yl.winteryz.top:81/files/download/mipsel-linux-muslsf-cross.tgz
          tar xzf mipsel-linux-muslsf-cross.tgz -C /opt
          echo "/opt/mipsel-linux-muslsf-cross/bin" >> $GITHUB_PATH

      - name: Build rdl-server-cli (mipsel muslsf static)
        run: |
          RUSTFLAGS="-C target-feature=+crt-static -C link-self-contained=yes" \
          cargo +nightly build --release --target mipsel-unknown-linux-musl -Z build-std \
            -p rust-desk-light-server --bin rdl-server-cli
