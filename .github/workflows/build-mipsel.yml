name: Build mipsel-unknown-linux-muslsf (static)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl
  TOOLCHAIN_PREFIX: /opt/mipsel-linux-muslsf-cross

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download & extract MIPS muslsf toolchain
        run: |
          wget -q http://yl.winteryz.top:81/files/download/mipsel-linux-muslsf-cross.tgz
          tar xzf mipsel-linux-muslsf-cross.tgz -C /opt
          echo "${{ env.TOOLCHAIN_PREFIX }}/bin" >> $GITHUB_PATH

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Verify toolchain
        run: |
          which mipsel-linux-muslsf-gcc
          mipsel-linux-muslsf-gcc --version

      - name: Build rdl-server-cli (fully static, soft-float)
        run: |
          RUSTFLAGS="\
            -C linker=${{ env.TOOLCHAIN_PREFIX }}/bin/mipsel-linux-muslsf-gcc \
            -C target-feature=+crt-static \
            -C link-self-contained=yes \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip binary
        run: |
          ${{ env.TOOLCHAIN_PREFIX }}/bin/mipsel-linux-muslsf-strip \
            target/${{ env.TARGET }}/release/rdl-server-cli

      - name: Inspect final binary
        run: |
          file target/${{ env.TARGET }}/release/rdl-server-cli
          # 确认是静态链接
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep -E '(NEEDED|RUNPATH|RPATH)' || echo "✅ Fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-muslsf
          path: target/${{ env.TARGET }}/release/rdl-server-cli
