name: Build mipsel-unknown-linux-muslsf (rdl-server-cli)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl
  TOOLCHAIN: mipsel-linux-muslsf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 安装 Nightly + rust-src（必须，用于 -Z build-std）
      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # ✅ 下载并解压 MIPS muslsf 交叉工具链
      - name: Download & setup MIPS muslsf toolchain
        run: |
          wget -q http://yl.winteryz.top:81/files/download/mipsel-linux-muslsf-cross.tgz
          tar xzf ${{ env.TOOLCHAIN }}-cross.tgz -C /opt
          echo "/opt/${{ env.TOOLCHAIN }}-cross/bin" >> $GITHUB_PATH

      # ✅ 验证工具链可用
      - name: Verify cross compiler
        run: ${{ env.TOOLCHAIN }}-gcc --version

      # ✅ 构建 rdl-server-cli（静态、软浮点、不依赖 alias）
      - name: Build rdl-server-cli (static, soft-float)
        run: |
          RUSTFLAGS="\
            -C linker=/opt/${{ env.TOOLCHAIN }}-cross/bin/${{ env.TOOLCHAIN }}-gcc \
            -C target-feature=+crt-static \
            -C link-self-contained=yes \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      # ✅ Strip 并验证产物
      - name: Strip & verify binary
        run: |
          /opt/${{ env.TOOLCHAIN }}-cross/bin/${{ env.TOOLCHAIN }}-strip \
            target/${{ env.TARGET }}/release/rdl-server-cli

          file target/${{ env.TARGET }}/release/rdl-server-cli

      # ✅ 上传 Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-${{ env.TARGET }}
          path: target/${{ env.TARGET }}/release/rdl-server-cli
