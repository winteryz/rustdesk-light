name: Build mipsel (Zig wrapper)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 关键：写一个 wrapper，让 Rust 以为这是一个普通的 gcc
      - name: Create zig-cc wrapper
        run: |
          cat > zig-mipsel-wrapper.sh << 'EOF'
          #!/bin/sh
          exec zig cc -target mipsel-linux-musl "$@"
          EOF
          chmod +x zig-mipsel-wrapper.sh

      - name: Build rdl-server-cli
        run: |
          RUSTFLAGS="\
            -C linker=$(pwd)/zig-mipsel-wrapper.sh \
            -C target-feature=+crt-static \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & inspect
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli
          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Static OK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel
          path: target/${{ env.TARGET }}/release/rdl-server-cli
