name: Build mipsel (router-ready, static)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 1. Rust Nightly + rust-src（Tier 3 必须） ──
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # ── 2. Zig 0.11（0.13 改了 MIPS 默认硬浮点，这里锁死 0.11） ──
      - name: Install Zig 0.11
        uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0

      # ── 3. 写 wrapper：唯一目的就是吃掉 Rust 的 -nostartfiles ──
      - name: Create soft-float zig wrapper
        run: |
          cat > zigwrap.sh << 'EOF'
          #!/bin/sh
          filtered=""
          while [ $# -gt 0 ]; do
            case "$1" in
              # Rust build-std 会硬塞这两个，Zig 收到就自闭，直接吞掉
              -nostartfiles|-nodefaultlibs) ;;
              *) filtered="$filtered \"$1\"" ;;
            esac
            shift
          done
          # 用 eval 保留参数原意，强制软浮点
          eval zig cc -target mipsel-linux-musl -msoft-float $filtered
          EOF
          chmod +x zigwrap.sh
          ./zigwrap.sh --version || zig --version

      # ── 4. 编译 rdl-server-cli ──
      - name: Build rdl-server-cli
        run: |
          RUSTFLAGS="\
            -C linker=$(pwd)/zigwrap.sh \
            -C target-feature=+crt-static \
            -C panic=abort" \
          cargo +nightly build \
            --release \
            --target ${{ env.TARGET }} \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      # ── 5. Strip 并自检 ──
      - name: Strip & inspect binary
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli

          echo "====== File type ======"
          file target/${{ env.TARGET }}/release/rdl-server-cli

          echo "====== Dynamic deps ======"
          if readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep -q NEEDED; then
            echo "⚠️  Not fully static!"
            readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED
          else
            echo "✅ Fully static — ready for RT-AC54U"
          fi

      # ── 6. 打包上传 ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-router
          path: target/${{ env.TARGET }}/release/rdl-server-cli
