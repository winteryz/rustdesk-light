name: Build mipsel (cargo-zigbuild)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 装 Nightly（不需要 rust-src，zigbuild 自带 std）
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      # 2. 装 Zig
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 3. 装 cargo-zigbuild
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      # 4. 直接编译（zigbuild 自动处理 crt + 静态）
      - name: Build rdl-server-cli
        run: |
          cargo zigbuild \
            --release \
            --target ${{ env.TARGET }} \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & inspect
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli
          
          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel
          path: target/${{ env.TARGET }}/release/rdl-server-cli
