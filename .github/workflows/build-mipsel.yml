name: Build mipsel (router-ready, static)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 1. Rust Nightly + rust-src（Tier 3 必须） ──
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src

      # ── 2. Zig 0.11（0.13 改了 MIPS 默认硬浮点，这里锁死 0.11） ──
      - name: Install Zig 0.11
        uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0

      # （备选）用 OpenWrt 官方 MIPS musl 工具链替代 Zig
      - name: Setup OpenWrt MIPS toolchain
        run: |
          wget -q https://downloads.openwrt.org/releases/22.03.5/targets/ramips/mt76x8/openwrt-sdk-22.03.5-ramips-mt76x8_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar xf *.tar.xz
          TOOLCHAIN_DIR=$(find $(pwd) -maxdepth 1 -name "openwrt-sdk*" -type d)
          GCC_BIN="$TOOLCHAIN_DIR/staging_dir/toolchain-mipsel_24kc_gcc-11.2.0_musl/bin/mipsel-openwrt-linux-musl-gcc"
          echo "LINKER=$GCC_BIN" >> $GITHUB_ENV
          echo "$TOOLCHAIN_DIR/staging_dir/toolchain-mipsel_24kc_gcc-11.2.0_musl/bin" >> $GITHUB_PATH

      - name: Build (OpenWrt toolchain)
        run: |
          RUSTFLAGS="-C linker=$LINKER -C target-feature=+crt-static -C link-self-contained=yes" \
          cargo +nightly build --release --target mipsel-unknown-linux-musl \
            -Z build-std=core,std,alloc,panic_abort \
            -p rust-desk-light-server --bin rdl-server-cli

      # ── 5. Strip 并自检 ──
      - name: Strip & inspect binary
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli

          echo "====== File type ======"
          file target/${{ env.TARGET }}/release/rdl-server-cli

          echo "====== Dynamic deps ======"
          if readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep -q NEEDED; then
            echo "⚠️  Not fully static!"
            readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED
          else
            echo "✅ Fully static — ready for RT-AC54U"
          fi

      # ── 6. 打包上传 ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel-router
          path: target/${{ env.TARGET }}/release/rdl-server-cli
