name: Build mipsel (cargo-zigbuild)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  TARGET: mipsel-unknown-linux-musl   # ← 关键：用 Rust 官方名，zigbuild 内部自己转 Zig

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Rust nightly（zigbuild 用 rustc 查 target，不需要 rust-src）
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly

      # 2. Zig（提供 mipsel musl sysroot + crt）
      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 3. cargo-zigbuild
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      # 4. 编译（不写 -Z build-std，zigbuild 走 Zig 的预编译 std）
      - name: Build rdl-server-cli
        run: |
          cargo zigbuild \
            --release \
            --target ${{ env.TARGET }} \
            -p rust-desk-light-server \
            --bin rdl-server-cli

      - name: Strip & inspect
        run: |
          zig objcopy --strip-all \
            target/${{ env.TARGET }}/release/rdl-server-cli \
            target/${{ env.TARGET }}/release/rdl-server-cli
          file target/${{ env.TARGET }}/release/rdl-server-cli
          readelf -d target/${{ env.TARGET }}/release/rdl-server-cli | grep NEEDED || echo "✅ Fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdl-server-cli-mipsel
          path: target/${{ env.TARGET }}/release/rdl-server-cli
