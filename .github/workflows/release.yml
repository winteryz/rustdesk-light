name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
          - name: macos-x64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-15
          - name: windows-x64
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.name }}

      - name: Build release binaries
        if: runner.os != 'macOS'
        run: cargo build --workspace --release --locked

      - name: Build release binaries
        if: runner.os == 'macOS'
        env:
          RDL_SKIP_MACOS_ADHOC_SIGN: "1"
        run: cargo build --workspace --release --locked

      - name: Build CLI client release binary
        if: runner.os != 'macOS'
        run: cargo build -p rust-desk-light-client --release --locked --no-default-features --features cli --bin rdl-client-cli --target-dir target/cli-release

      - name: Build CLI client release binary
        if: runner.os == 'macOS'
        env:
          RDL_SKIP_MACOS_ADHOC_SIGN: "1"
        run: cargo build -p rust-desk-light-client --release --locked --no-default-features --features cli --bin rdl-client-cli --target-dir target/cli-release

      - name: Ad-hoc sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - --identifier local.rust-desk-light.server.cli target/release/rdl-server-cli
          codesign --force --sign - --identifier local.rust-desk-light.client.gui target/release/rdl-client-gui
          codesign --force --sign - --identifier local.rust-desk-light.client.cli target/cli-release/release/rdl-client-cli
          codesign --force --sign - --identifier local.rust-desk-light.admin.gui target/release/rdl-admin-gui
          codesign --verify --verbose target/release/rdl-server-cli
          codesign --verify --verbose target/release/rdl-client-gui
          codesign --verify --verbose target/cli-release/release/rdl-client-cli
          codesign --verify --verbose target/release/rdl-admin-gui

      - name: Package Unix artifacts
        if: runner.os != 'Windows'
        run: |
          package="rust-desk-light-${{ matrix.name }}"
          mkdir -p "dist/$package"
          cp target/release/rdl-server-cli "dist/$package/"
          cp target/release/rdl-client-gui "dist/$package/"
          cp target/cli-release/release/rdl-client-cli "dist/$package/"
          cp target/release/rdl-admin-gui "dist/$package/"
          cp README.md "dist/$package/"
          cp -R config "dist/$package/"
          cp -R assets/i18n "dist/$package/"
          chmod +x "dist/$package"/rdl-*
          tar -czf "dist/$package.tar.gz" -C "dist/$package" .

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "rust-desk-light-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist\$package" | Out-Null
          Copy-Item "target\release\rdl-server-cli.exe" "dist\$package\"
          Copy-Item "target\release\rdl-client-gui.exe" "dist\$package\"
          Copy-Item "target\cli-release\release\rdl-client-cli.exe" "dist\$package\"
          Copy-Item "target\release\rdl-admin-gui.exe" "dist\$package\"
          Copy-Item "README.md" "dist\$package\"
          Copy-Item "config" "dist\$package\" -Recurse
          Copy-Item "assets\i18n" "dist\$package\" -Recurse
          Compress-Archive -Path "dist\$package\*" -DestinationPath "dist\$package.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-desk-light-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: rust-desk-light ${{ github.ref_name }}
          body: |
            ## rust-desk-light ${{ github.ref_name }}

            Auto-generated release from tag `${{ github.ref_name }}`.

            ### Packages

            | Platform | Package | Archive |
            | --- | --- | --- |
            | Linux x64 | rust-desk-light-linux-x64.tar.gz | tar.gz |
            | macOS x64 | rust-desk-light-macos-x64.tar.gz | tar.gz |
            | macOS ARM64 | rust-desk-light-macos-arm64.tar.gz | tar.gz |
            | Windows x64 | rust-desk-light-windows-x64.zip | zip |

            ### Package Contents

            Each package contains the following binaries and documentation:

            ```
            rust-desk-light-<platform>/
            ├── rdl-server-cli      # Terminal relay server daemon
            ├── rdl-client-gui      # GUI client application
            ├── rdl-client-cli      # Terminal-only client application
            ├── rdl-admin-gui       # Administration GUI utility
            ├── config/             # Server, client, and admin config templates
            ├── i18n/               # Admin GUI translation files
            └── README.md           # Documentation
            ```

            **Binary Types:**
            - `rdl-server-cli` - Server application (terminal executable binary)
            - `rdl-client-gui` - GUI client application (executable binary)
            - `rdl-client-cli` - Terminal-only client application built without GUI dependencies
            - `rdl-admin-gui` - Admin GUI tool (executable binary)
            - `config/*.template.toml` - Example configuration files for server, client, and admin
            - `i18n/*.toml` - Optional translation files for rdl-admin-gui

            All binaries are native Rust release builds optimized for their respective platforms.

            **Platform-Specific Notes:**
            - **Linux**: Requires glibc and common X11 development libraries
            - **macOS**: Ad-hoc signed binaries for M1/M2/M3 (ARM64) and Intel (x64) architectures
            - **Windows**: Native Windows executables (.exe)
          draft: false
          prerelease: false
          files: dist/*
